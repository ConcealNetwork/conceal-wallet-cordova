name: Build signed APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "platforms;android-35" \
            "build-tools;36.0.0"
          yes | sdkmanager --licenses

      - name: Install Cordova CLI
        run: npm install -g cordova@latest

      - name: Make build scripts executable
        run: chmod +x switch.sh build-with-version.sh build-fdroid.sh

      - name: Prepare signing config
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing required secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD"
            exit 1
          fi

          mkdir -p keys
          echo "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > keys/release-keystore.jks
          decoded_size=$(wc -c < keys/release-keystore.jks)
          if [ "$decoded_size" -lt 500 ]; then
            echo "Decoded keystore is only ${decoded_size} bytes — ANDROID_KEYSTORE_BASE64 is truncated or invalid"
            exit 1
          fi

          jq -n \
            --arg alias "${ANDROID_KEY_ALIAS:-conceal-mobile}" \
            --arg storePass "$ANDROID_KEYSTORE_PASSWORD" \
            --arg keyPass "$ANDROID_KEY_PASSWORD" \
            '{
              android: {
                release: {
                  keystore: "keys/release-keystore.jks",
                  storePassword: $storePass,
                  alias: $alias,
                  password: $keyPass,
                  keystoreType: "PKCS12",
                  packageType: "apk"
                }
              }
            }' > build.json

      - name: Build signed APK (sdk35, regular)
        run: printf '1\nr\n' | ./switch.sh

      - name: Remove signing files
        if: always()
        run: |
          rm -f build.json
          rm -f keys/release-keystore.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: conceal-mobile-signed-apk
          path: |
            builds/*.apk
            builds/*.sha256
          if-no-files-found: error
