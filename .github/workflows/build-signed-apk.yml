name: Build signed APK

on:
  push:
    tags:
      - "*-f-droid"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platforms;android-36" \
            "platforms;android-35" \
            "build-tools;34.0.0" \
            "build-tools;36.0.0"
          yes | sdkmanager --licenses
          # Gradle may use newer build-tools; apksigner MUST be 34 for F-Droid sig copy.
          # https://f-droid.org/docs/Reproducible_Builds/#apksigner-from-build-tools-3500-rc1-outputs-unverifiable-apks
          echo "APKSIGNER=$ANDROID_HOME/build-tools/34.0.0/apksigner" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/build-tools/36.0.0" >> "$GITHUB_PATH"

      - name: Set up Node.js 24
        if: github.ref_type != 'tag' || !endsWith(github.ref_name, '-f-droid')
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Cordova CLI
        if: github.ref_type != 'tag' || !endsWith(github.ref_name, '-f-droid')
        run: npm install -g cordova@latest

      - name: Make build scripts executable
        run: chmod +x switch.sh build-with-version.sh build-fdroid.sh build-fdroid-reference.sh

      - name: Prepare signing config (Cordova release build)
        if: github.ref_type != 'tag' || !endsWith(github.ref_name, '-f-droid')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing required secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD"
            exit 1
          fi

          mkdir -p keys
          echo "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > keys/release-keystore.jks
          decoded_size=$(wc -c < keys/release-keystore.jks)
          if [ "$decoded_size" -lt 500 ]; then
            echo "Decoded keystore is only ${decoded_size} bytes — ANDROID_KEYSTORE_BASE64 is truncated or invalid"
            exit 1
          fi

          jq -n \
            --arg alias "${ANDROID_KEY_ALIAS:-conceal-mobile}" \
            --arg storePass "$ANDROID_KEYSTORE_PASSWORD" \
            --arg keyPass "$ANDROID_KEY_PASSWORD" \
            '{
              android: {
                release: {
                  keystore: "keys/release-keystore.jks",
                  storePassword: $storePass,
                  alias: $alias,
                  password: $keyPass,
                  keystoreType: "PKCS12",
                  packageType: "apk"
                }
              }
            }' > build.json

      - name: Build F-Droid reference APK (unsigned + inplace-fix.py)
        if: github.ref_type == 'tag' && endsWith(github.ref_name, '-f-droid')
        run: ./build-fdroid-reference.sh

      - name: Decode release keystore (F-Droid signing)
        if: github.ref_type == 'tag' && endsWith(github.ref_name, '-f-droid')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "Missing required secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_PASSWORD"
            exit 1
          fi

          mkdir -p keys
          echo "$ANDROID_KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > keys/release-keystore.jks
          decoded_size=$(wc -c < keys/release-keystore.jks)
          if [ "$decoded_size" -lt 500 ]; then
            echo "Decoded keystore is only ${decoded_size} bytes — ANDROID_KEYSTORE_BASE64 is truncated or invalid"
            exit 1
          fi

          echo "ANDROID_KEY_ALIAS=${ANDROID_KEY_ALIAS:-conceal-mobile}" >> "$GITHUB_ENV"

      - name: Sign F-Droid reference APK
        if: github.ref_type == 'tag' && endsWith(github.ref_name, '-f-droid')
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          VERSION=$(grep -o 'version="[^"]*"' config.xml | head -1 | cut -d'"' -f2)
          APK="builds/Conceal_Mobile-v${VERSION}-java21.apk"

          "$APKSIGNER" sign \
            --ks keys/release-keystore.jks \
            --ks-key-alias "$ANDROID_KEY_ALIAS" \
            --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
            --key-pass "pass:$ANDROID_KEY_PASSWORD" \
            --out "${APK}.signed" \
            "$APK"

          mv "${APK}.signed" "$APK"
          sha256sum "$APK" | cut -d' ' -f1 > "$APK.sha256"
          "$APKSIGNER" verify --verbose "$APK"

      - name: Build signed APK (regular Cordova)
        if: github.ref_type != 'tag' || !endsWith(github.ref_name, '-f-droid')
        run: printf '1\nr\n' | ./switch.sh

      - name: Verify F-Droid release artifact
        if: github.ref_type == 'tag' && endsWith(github.ref_name, '-f-droid')
        run: |
          VERSION=$(grep -o 'version="[^"]*"' config.xml | head -1 | cut -d'"' -f2)
          APK="builds/Conceal_Mobile-v${VERSION}-java21.apk"
          test -f "$APK"
          echo "Found reference APK: $APK ($(wc -c < "$APK") bytes)"

      - name: Remove signing files
        if: always()
        run: |
          rm -f build.json
          rm -f keys/release-keystore.jks

      - name: Create GitHub release
        if: github.ref_type == 'tag' && endsWith(github.ref_name, '-f-droid')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            builds/*.apk
            builds/*.sha256
          generate_release_notes: true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: conceal-mobile-signed-apk
          path: |
            builds/*.apk
            builds/*.sha256
          if-no-files-found: error
